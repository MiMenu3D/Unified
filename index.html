<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Motores de 8th Wall (necesarios para el tracking) -->
<script crossorigin="anonymous" src="./external/runtime/  runtime.js"></script>
<script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script>
<script src="bundle.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>A-Frame AR - Version Unified 1.02 </title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/three@0.139.2/examples/js/loaders/RGBELoader.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
#prueba {
  font-size: 22px;
  color: white;
  text-shadow: 0 0 10px black;
  margin-bottom: 12px;
}

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: #1f1a17;
}

#mvContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40%;
  background: #1f1a17;
  z-index: 40;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: transparent;
  filter: saturate(0.87) contrast(0.88);
  opacity: 0;
  transition: opacity 0.5s ease;
}

#startScreen {
  position: fixed;
  top: 40%;
  left: 0;
  right: 0;
  bottom: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 30;
}

.arrowContainer { display:flex; gap:20px; margin-bottom:10px; }

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
}

#arContainer {
  position: fixed;
  inset: 0;
  background: #1f1a17;
  z-index: 51;
  display: none;
}

a-scene { width:100%; height:100%; }
.mindar-ui-scanning { z-index:51 !important; }
  #lightDebug {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 9999;
  color: white;
  font-size: 22px;
  text-shadow: 0 0 10px black;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<div id="mvContainer"></div>

<div id="startScreen">
  <div id="prueba"> Version Unified 1.02 </div>
  <div id="label">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">←</button>
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="button" onclick="startAR()">Ver en tu mesa</button>
</div>

<div id="arContainer"></div>
  <button id="envToggle" onclick="toggleEnv()"
style="
position: fixed;
bottom: 20px;
right: 20px;
z-index: 99999;
padding: 12px 16px;
border-radius: 12px;
border: none;
background: white;
color: black;
font-size: 14px;
">
Env: HDR
</button>

<div id="lightDebug">LIGHT --</div>

<script>
// RepoFusion bridge listener v1.0
window.RepoFusion = window.RepoFusion || {};

window.RepoFusion.pose = {
  camera: null,
  marker: null,
  intrinsics: null,
  tracking: "waiting"
};

window.RepoFusion.setPose = function (data) {
  if (!data) return;
  window.RepoFusion.pose.camera = data.camera || null;
  window.RepoFusion.pose.marker = data.marker || null;
  window.RepoFusion.pose.intrinsics = data.intrinsics || null;
  window.RepoFusion.pose.tracking = data.tracking || "unknown";
};
</script>
<script>
let current = 0;
let envEnabled = true;
let originalEnv = null;
let cameraEnv = null;
let envMode = "hdr";
let pmremGenerator = null;
let cameraRT = null;
let mv = null;

const models = [
  "Plato_01.glb","Plato_02.glb","Plato_03.glb","Plato_04.glb",
  "Plato_05.glb","Plato_06.glb","Plato_07.glb","Plato_08.glb",
  "Plato_09.glb","Plato_10.glb","Plato_11.glb","Plato_12.glb",
  "Plato_13.glb","Plato_14.glb","Plato_15.glb"
];

function createMV(){
  const container = document.getElementById("mvContainer");

  container.innerHTML = `
    <model-viewer
      id="mv"
      src="${models[current]}"
      autoplay
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="17deg"
      camera-orbit="0deg 70deg 45%"
      min-camera-orbit="0deg 0deg 45%"
      max-camera-orbit="360deg 90deg 45%"
      camera-controls="false"
      touch-action="none"
      disable-pan
      disable-zoom
      interaction-prompt="none"
      shadow-intensity="0.4"
      exposure="0.80"
      style="background-color:#1f1a17;">
    </model-viewer>`;

  mv = document.getElementById("mv");
  mv.addEventListener("load", () => mv.style.opacity = "1", {once:true});
  document.getElementById("label").innerText = "Plato " + (current + 1);
}

function updateMV(){
  if (!mv) return;
  mv.style.opacity = "0";
  mv.setAttribute("src", models[current]);
  mv.addEventListener("load", () => mv.style.opacity = "1", {once:true});
  document.getElementById("label").innerText = "Plato " + (current + 1);
}

function destroyMV(){
  document.getElementById("mvContainer").innerHTML = "";
  mv = null;
}

function createAR(){

  const container = document.getElementById("arContainer");

  container.innerHTML = `
    <a-scene
      mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true; filterMinCF: 0.0002; filterBeta: 0.004;"
      renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true; exposure: 1.01; toneMapping: ACESFilmicToneMapping;"
      color-space="sRGB"
      vr-mode-ui="enabled:false"
      device-orientation-permission-ui="enabled:false">

      <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="aframeModel"
          src="${models[current]}"
          rotation="90 0 0"
          scale="8 8 8">
        </a-gltf-model>
      </a-entity>

    </a-scene>`;

  const sceneEl = container.querySelector("a-scene");

  sceneEl.addEventListener("loaded", () => {

    console.log("A-Frame cargado");
    pmremGenerator =
  new THREE.PMREMGenerator(sceneEl.renderer);

pmremGenerator.compileEquirectangularShader();

console.log("PMREM listo");
    const prueba = document.getElementById("lightDebug");

setTimeout(() => {

  if (sceneEl.renderer) {
    prueba.style.display = "block";
    prueba.innerText = "RENDERER OK";
  } else {
    prueba.style.display = "block";
    prueba.innerText = "NO RENDERER";
  }

}, 1000);
    setTimeout(() => {

  const video = document.querySelector("video");
      if (video && window.THREE) {

  cameraEnv = new THREE.VideoTexture(video);

  cameraEnv.colorSpace = THREE.SRGBColorSpace;

  console.log("Camera texture lista");

}
  const prueba = document.getElementById("lightDebug");
prueba.style.display = "block";

  if (!video) {
    prueba.innerText = "NO VIDEO";
    return;
  }

  const canvas = document.createElement("canvas");
  canvas.width = 64;
  canvas.height = 64;
  const envTexture =
  new THREE.CanvasTexture(canvas);

envTexture.mapping =
  THREE.EquirectangularReflectionMapping;

  const ctx = canvas.getContext("2d");

  let smoothed = 120; // estabilidad inicial
const alpha = 0.08; // suavizado

envInterval = setInterval(() => {

  ctx.drawImage(video, 0, 0, 64, 64);
  envTexture.needsUpdate = true;
  if (pmremGenerator) {

  if (cameraRT) {
    cameraRT.dispose();
  }

  cameraRT =
    pmremGenerator.fromEquirectangular(envTexture);
    envTexture.needsUpdate = true;
    if (envMode === "cam") {

  sceneEl.object3D.environment =
    cameraRT.texture;

}

}

  const pixels = ctx.getImageData(0, 0, 64, 64).data;

  let total = 0;

  for (let i = 0; i < pixels.length; i += 4) {
    total += (pixels[i] + pixels[i + 1] + pixels[i + 2]) / 3;
  }

  const brightness = total / (pixels.length / 4);

  // suavizado (clave)
  smoothed = smoothed + (brightness - smoothed) * alpha;

  // mapping a exposure usable
  const exposure = 0.6 + (smoothed / 255) * 0.9;

  const scene = document.querySelector("a-scene");

  if (scene && scene.renderer) {
    scene.renderer.exposure = exposure;
  }
  if (envMode === "cam" && cameraRT) {

  scene.object3D.environment =
    cameraRT.texture;

}
  const target = document.querySelector("[mindar-image-target]");

if (target) {

  const p = target.object3D.position;
const q = target.object3D.quaternion;
const s = target.object3D.scale;

  target.object3D.matrixWorld.decompose(p, q, s);
  
  prueba.innerText =
`LIGHT ${Math.round(smoothed)} | EXP ${exposure.toFixed(2)}

PX ${p.x.toFixed(5)}
PY ${p.y.toFixed(5)}
PZ ${p.z.toFixed(5)}

SX ${s.x.toFixed(5)}

QX ${q.x.toFixed(5)}
QY ${q.y.toFixed(5)}
QZ ${q.z.toFixed(5)}
QW ${q.w.toFixed(5)}`;
}
  
}, 50);
      
}, 200);
    if (!window.THREE || !THREE.RGBELoader) {
      console.error("RGBELoader no disponible");
      return;
    }

    const loader = new THREE.RGBELoader();

    loader.load("cinema_lobby_B-N.hdr", function(hdrTexture){

      console.log("HDR cargado");

      hdrTexture.mapping = THREE.EquirectangularReflectionMapping;

originalEnv = hdrTexture; // guardamos referencia

sceneEl.object3D.environment = hdrTexture;

      const model = document.getElementById("aframeModel");

      model.addEventListener("model-loaded", () => {

        model.object3D.traverse((obj) => {
          if (!obj.isMesh || !obj.material) return;
          obj.material.envMapIntensity = 0.9;
          obj.material.needsUpdate = true;
        });

        console.log("HDR aplicado");

      }, {once:true});

    }, undefined, function(err){
      console.error("Error HDR:", err);
    });

  }, {once:true});
}

function destroyAR(){
  if (envInterval) {
  clearInterval(envInterval);
  envInterval = null;
}
  document.getElementById("arContainer").innerHTML = "";
}

function prev(){
  current = (current - 1 + models.length) % models.length;
  updateMV();
}

function next(){
  current = (current + 1) % models.length;
  updateMV();
}

function startAR(){
  // --- AÑADIMOS EL ARRANQUE DE 8TH WALL AQUÍ ---
  const bundle = document.createElement("script");
  bundle.src = "bundle.js";
  document.body.appendChild(bundle);

  const bridge = document.createElement("script");
  bridge.src = "bridge.js?t=" + Date.now();
  document.body.appendChild(bridge);
  // ---------------------------------------------

  history.pushState({mode:"ar", current}, "");
  destroyMV();
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("arContainer").style.display = "block";
  createAR();
}

function stopAR(){
  destroyAR();
  document.getElementById("lightDebug").style.display = "none";
  document.querySelectorAll(".mindar-ui-scanning")
  .forEach(el => el.remove());
  document.getElementById("arContainer").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
  createMV();
}

window.addEventListener("popstate", () => stopAR());
createMV();

function toggleEnv(){

  const scene = document.querySelector("a-scene");
  const btn = document.getElementById("envToggle");

  if (!scene) return;

  if (envMode === "hdr") {

    if (cameraRT) {
  scene.object3D.environment =
    cameraRT.texture;
}

    envMode = "cam";

    btn.innerText = "Env: CAM";

  }

  else if (envMode === "cam") {

    scene.object3D.environment = null;

    envMode = "off";

    btn.innerText = "Env: OFF";

  }

  else {

    scene.object3D.environment = originalEnv;

    envMode = "hdr";

    btn.innerText = "Env: HDR";

  }
}
</script>

</body>
</html>
