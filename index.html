<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>From 8thWallPuro-Copilot 3.02</title>
<!-- version 3.5 -->

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
#prueba {
  font-size: 22px;
  color: white;
  text-shadow: 0 0 10px black;
  margin-bottom: 12px;
}

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: #1f1a17;
}

#mvContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40%;
  background: #1f1a17;
  z-index: 40;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: transparent;
  filter: saturate(0.87) contrast(0.88);
  opacity: 0;
  transition: opacity 0.5s ease;
}

#startScreen {
  position: fixed;
  top: 40%;
  left: 0;
  right: 0;
  bottom: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 30;
}

.arrowContainer { display:flex; gap:20px; margin-bottom:10px; }

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
}


</style>
</head>

<body>

<div id="mvContainer"></div>

<div id="startScreen">
  <div id="prueba">From 8thWallPuro-Copilot 3.02</div>
  <div id="label">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">&#8592;</button>
    <button class="arrow" onclick="next()">&#8594;</button>
  </div>

  <button class="button" onclick="startAR()">Ver en tu mesa</button>
</div>


<script src="menu.js"></script>
</body>
</html>
