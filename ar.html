<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AR Over Success04-Copilot 2.05</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/three@0.139.2/examples/js/loaders/RGBELoader.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; background: transparent; }
    #arContainer { position: fixed; inset: 0; z-index: 51; }
    a-scene, a-scene canvas, #arContainer video { background: transparent !important; }
    a-scene { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="arContainer"></div>
  <button id="envToggle" onclick="toggleEnv()" style="position:fixed;bottom:20px;right:20px;z-index:99999;padding:12px 16px;border-radius:12px;border:none;background:white;color:black;font-size:14px;">Env: HDR</button>

  <script>
    // === FIX 1: RepoFusion completo, incluyendo setPose ===
    window.RepoFusion = {};
    window.RepoFusion.pose = { marker: null, tracking: "waiting" };
    window.RepoFusion.setPose = function(data) {
      if (!data) return;
      window.RepoFusion.pose.marker   = data.marker   || null;
      window.RepoFusion.pose.tracking = data.tracking || "unknown";
    };

    // === xr-config (target real + width física explícita) ===
    const TARGET_PHYSICAL_WIDTH_M = 0.115;
    const DEFAULT_TARGET = {
      type: "PLANAR",
      properties: { top: 0, left: 312, width: 1875, height: 2500, isRotated: false, originalWidth: 2500, originalHeight: 2500 },
      imagePath: "image-targets/marker_luminance.png",
      metadata: null,
      name: "marker",
      resources: {
        originalImage: "marker_original.png",
        croppedImage: "marker_cropped.png",
        thumbnailImage: "marker_thumbnail.png",
        luminanceImage: "marker_luminance.png"
      },
      created: 1781091877698,
      updated: 1781091877698
    };
    window.xrConfigData = { imageTargetData: [DEFAULT_TARGET] };

    async function buildXRConfigData() {
      let target = { ...DEFAULT_TARGET };
      try {
        const res = await fetch("image-targets/marker.json", { cache: "no-store" });
        if (res.ok) target = await res.json();
      } catch (_) {
        // Usa target embebido si marker.json no está accesible en este entorno
      }
      target.physicalWidthInMeters = TARGET_PHYSICAL_WIDTH_M;
      target.loadAutomatically = true;
      return { imageTargetData: [target] };
    }

    async function configureXR8Targets() {
      if (!window.XR8 || !window.XR8.XrController || typeof window.XR8.XrController.configure !== "function") return;
      window.xrConfigData = await buildXRConfigData();
      window.XR8.XrController.configure(window.xrConfigData);
    }

    if (window.XR8) { configureXR8Targets().catch(() => {}); }
    else {
      const onXrLoaded = () => configureXR8Targets().catch(() => {});
      window.addEventListener("xrloaded", onXrLoaded, { once: true });
      window.addEventListener("XRloaded", onXrLoaded, { once: true });
    }

    // === Bridge v3.0 (tracking-tuned) ===
    const BRIDGE_VERSION = "Bridge v3.0";
    const EVENT_PRIORITY_MS = 450;
    const LOST_GRACE_MS = 1600;
    const panel = document.createElement("div");
    panel.id = "bridgeDebugPanel";
    panel.style.cssText = "position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.85);color:lime;padding:10px;font-family:monospace;font-size:12px;white-space:pre;z-index:999999;max-height:85vh;overflow:auto;cursor:pointer;";
    let isMinimized = false;
    panel.onclick = (e) => {
      e.stopPropagation();
      isMinimized = !isMinimized;
      panel.style.height = isMinimized ? "20px" : "auto";
      panel.style.overflow = isMinimized ? "hidden" : "auto";
    };
    document.body.appendChild(panel);

    window.Tracking = { marker: null, tracking: "waiting", source: "none", lastEvent: "none" };
    let lastEventPoseTs = 0;
    let lastPoseTs = 0;

    function updateTracking(marker, tracking, source, eventName) {
      window.Tracking.marker = marker || window.Tracking.marker;
      window.Tracking.tracking = tracking;
      window.Tracking.source = source;
      window.Tracking.lastEvent = eventName;
      if (marker && marker.position && marker.rotation) lastPoseTs = performance.now();
      if (window.RepoFusion && window.RepoFusion.setPose) {
        window.RepoFusion.setPose({ marker: window.Tracking.marker, tracking: tracking });
      }
    }

    function toMarker(payload) {
      if (!payload) return null;
      const candidate = payload.image || payload.target || payload;
      const position = candidate.position || payload.position || null;
      const rotation = candidate.rotation || payload.rotation || null;
      if (!position || !rotation) return null;
      return {
        position,
        rotation,
        scale: candidate.scale ?? payload.scale ?? 1,
        name: candidate.name || payload.name || "marker"
      };
    }

    function installBridge() {
      if (!window.XR8) return;
      XR8.addCameraPipelineModule({
        name: "bridge-exporter-v3",
        listeners: [
          {
            event: "reality.imagefound",
            process: (evt) => {
              const marker = toMarker(evt?.detail || evt);
              if (!marker) return;
              lastEventPoseTs = performance.now();
              updateTracking(marker, "tracking", "event", "reality.imagefound");
            }
          },
          {
            event: "reality.imageupdated",
            process: (evt) => {
              const marker = toMarker(evt?.detail || evt);
              if (!marker) return;
              lastEventPoseTs = performance.now();
              updateTracking(marker, "tracking", "event", "reality.imageupdated");
            }
          },
          {
            event: "reality.imagelost",
            process: () => {
              // Mantener última pose para preservar persistencia visual vía VIO
              updateTracking(window.Tracking.marker, "limited", "event", "reality.imagelost");
            }
          }
        ],
        onUpdate: ({ processCpuResult }) => {
          // Fallback sólo cuando no hay evento reciente para evitar pelear con la vía principal
          const reality = processCpuResult?.reality;
          const img = reality?.detectedImages?.[0];
          const now = performance.now();
          const recentEventActive = (now - lastEventPoseTs) < EVENT_PRIORITY_MS;
          if (!recentEventActive && img && img.position && img.rotation) {
            const marker = { position: img.position, rotation: img.rotation, scale: img.scale || 1, name: img.name || "marker" };
            updateTracking(marker, reality?.trackingStatus || "tracking", "fallback", "onUpdate");
          } else if (!recentEventActive && (now - lastPoseTs) > LOST_GRACE_MS && window.Tracking.tracking !== "waiting") {
            updateTracking(window.Tracking.marker, "lost", window.Tracking.source, "lost-by-onUpdate");
          }
        }
      });
    }

    if (window.XR8) installBridge();
    else window.addEventListener("xrloaded", installBridge, { once: true });

    function renderBridge() {
      const m = window.Tracking.marker;
      const s = m ? Number(m.scale || 0).toFixed(4) : "-";
      let out = BRIDGE_VERSION + "\n\n";
      out += "TRACKING: " + window.Tracking.tracking + "\n";
      out += "SOURCE: " + window.Tracking.source + "\n";
      out += "EVENT: " + window.Tracking.lastEvent + "\n";
      out += "SCALE: " + s + "\n";
      out += "POSE_AGE_MS: " + (lastPoseTs ? Math.round(performance.now() - lastPoseTs) : "-") + "\n";
      out += "XR_BOOT: " + xrBootState.status + " (" + xrBootState.source + ")\n";
      out += "XR8: " + (window.XR8 ? "YES" : "NO") + "\n";
      const v = document.querySelector("video");
      out += "VIDEO: " + (v ? "YES" : "NO");
      panel.textContent = out;
    }
    setInterval(renderBridge, 350);

    // === AR engine ===
    let originalEnv = null, cameraEnv = null, envMode = "hdr";
    let pmremGenerator = null, cameraRT = null;
    let envInterval = null, arAnimationId = null, xrLoadPromise = null;
    let envTexture = null, envCanvas = null, video = null;
    let markerFound = false, scanOverlay = null;
    let xrBootState = { status: "idle", source: "none" };
    let poseInitialized = false;
    const MODEL_SCALE_MULTIPLIER = 8;

    function loadScriptOnce({ id, src, async = false, attrs = {} }) {
      return new Promise((resolve, reject) => {
        const existing = document.getElementById(id);
        if (existing) {
          if (existing.dataset.loaded === "1") { resolve("already"); return; }
          existing.addEventListener("load", () => {
            existing.dataset.loaded = "1";
            resolve("loaded");
          }, { once: true });
          existing.addEventListener("error", () => reject(new Error("Script failed: " + src)), { once: true });
          return;
        }
        const s = document.createElement("script");
        s.id = id;
        s.src = src;
        s.async = async;
        Object.entries(attrs).forEach(([k, v]) => s.setAttribute(k, v));
        s.addEventListener("load", () => {
          s.dataset.loaded = "1";
          resolve("loaded");
        }, { once: true });
        s.addEventListener("error", () => reject(new Error("Script failed: " + src)), { once: true });
        document.body.appendChild(s);
      });
    }

    function timeoutReject(ms, label) {
      return new Promise((_, reject) => {
        setTimeout(() => reject(new Error(label + " timeout")), ms);
      });
    }

    // FIX 2: arranque robusto (local por defecto, CDN opcional)
    async function loadXR8Assets() {
      if (window.XR8) {
        xrBootState = { status: "ready", source: "already" };
        return "already";
      }

      xrBootState = { status: "loading-runtime", source: "none" };
      await loadScriptOnce({ id: "runtimeScript", src: "./external/runtime/runtime.js", attrs: { crossorigin: "anonymous" } });

      const forceMode = new URLSearchParams(window.location.search).get("xr"); // local | cdn

      const loadLocal = async () => {
        xrBootState = { status: "loading-local", source: "local" };
        await loadScriptOnce({
          id: "xrScriptLocal",
          src: "./external/xr/xr.js",
          async: true,
          attrs: { "data-preload-chunks": "face, slam" }
        });
        await waitForXR8(9000);
        xrBootState = { status: "ready", source: "local" };
        return "local";
      };

      const loadCdn = async () => {
        xrBootState = { status: "loading-cdn", source: "cdn" };
        await Promise.race([
          loadScriptOnce({
            id: "xrScriptCdn",
            src: "https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js",
            async: true,
            attrs: { crossorigin: "anonymous", "data-preload-chunks": "slam" }
          }).then(() => waitForXR8(7000)),
          timeoutReject(9000, "xr-cdn")
        ]);
        xrBootState = { status: "ready", source: "cdn" };
        return "cdn";
      };

      if (forceMode === "local") return loadLocal();
      if (forceMode === "cdn") {
        try { return await loadCdn(); }
        catch (_) { return loadLocal(); }
      }

      try {
        return await loadLocal();
      } catch (_) {
        return loadCdn();
      }
    }

    function waitForXR8(timeoutMs = 0) {
      if (window.XR8) return Promise.resolve(window.XR8);

      if (!xrLoadPromise) {
        xrLoadPromise = new Promise((resolve) => {
          const cb = () => resolve(window.XR8);
          window.addEventListener("xrloaded", cb, { once: true });
          window.addEventListener("XRloaded", cb, { once: true });
        });
      }

      if (!timeoutMs) return xrLoadPromise;
      return Promise.race([
        xrLoadPromise,
        timeoutReject(timeoutMs, "XR8 ready")
      ]);
    }

    function createARScene(modelSrc) {
      markerFound = false; scanOverlay = null;
      const container = document.getElementById("arContainer");
      container.style.background = "transparent";
      container.innerHTML = `
        <a-scene
          xrweb
          xrconfig="cameraDirection: back; delayRun: true"
          renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true; exposure: 1.01; toneMapping: ACESFilmicToneMapping;"
          color-space="sRGB"
          embedded
          vr-mode-ui="enabled:false"
          device-orientation-permission-ui="enabled:false">
          <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
          <a-entity id="trackingRoot">
            <a-gltf-model id="aframeModel" src="${modelSrc}" rotation="90 0 0" scale="1 1 1" visible="false"></a-gltf-model>
          </a-entity>
        </a-scene>`;

      scanOverlay = document.createElement("div");
      scanOverlay.id = "mindarScanningOverlay";
      scanOverlay.className = "mindar-ui-scanning";
      scanOverlay.innerHTML = `<div>Escaneando marcador...</div>`;
      container.appendChild(scanOverlay);

      const sceneEl = container.querySelector("a-scene");
      sceneEl.addEventListener("loaded", () => {
        if (arAnimationId) cancelAnimationFrame(arAnimationId);
        poseInitialized = false;

        const applyPose = () => {
          arAnimationId = requestAnimationFrame(applyPose);
          const root = document.getElementById("trackingRoot");
          if (!root || !window.RepoFusion) return;
          const marker = window.RepoFusion.pose.marker;
          const hasMarker = marker && marker.position && marker.rotation;
          if (!markerFound && hasMarker) {
            markerFound = true;
            const model = document.getElementById("aframeModel");
            if (model) model.setAttribute("visible", true);
            if (scanOverlay) scanOverlay.style.display = "none";
          }
          if (!hasMarker) return;

          const eventFresh = (performance.now() - lastEventPoseTs) < EVENT_PRIORITY_MS;
          const fastAlpha = eventFresh ? 0.82 : 0.45;
          const slowAlpha = eventFresh ? 0.60 : 0.25;

          const targetPosition = new THREE.Vector3(marker.position.x, marker.position.y, marker.position.z);
          const targetQuat = new THREE.Quaternion(marker.rotation.x, marker.rotation.y, marker.rotation.z, marker.rotation.w);
          const rawScale = Math.max(marker.scale || 1, 0.0001) * MODEL_SCALE_MULTIPLIER;

          if (!poseInitialized) {
            root.object3D.position.copy(targetPosition);
            root.object3D.quaternion.copy(targetQuat);
            root.object3D.scale.setScalar(rawScale);
            poseInitialized = true;
            return;
          }

          root.object3D.position.lerp(targetPosition, fastAlpha);
          root.object3D.quaternion.slerp(targetQuat, fastAlpha);
          const currentScale = root.object3D.scale.x || rawScale;
          const maxDelta = Math.max(currentScale * 0.18, 0.02);
          const boundedScale = THREE.MathUtils.clamp(rawScale, currentScale - maxDelta, currentScale + maxDelta);
          root.object3D.scale.setScalar(THREE.MathUtils.lerp(currentScale, boundedScale, slowAlpha));
        };
        applyPose();

        pmremGenerator = new THREE.PMREMGenerator(sceneEl.renderer);
        pmremGenerator.compileEquirectangularShader();

        const waitForVideo = setInterval(() => {
          const candidate = document.querySelector("video");
          if (candidate && candidate.readyState >= 2) {
            clearInterval(waitForVideo);
            video = candidate;
            video.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:50;pointer-events:none;";
            cameraEnv = new THREE.VideoTexture(video);
            cameraEnv.colorSpace = THREE.SRGBColorSpace;

            envCanvas = document.createElement("canvas");
            envCanvas.width = 32; envCanvas.height = 32;
            envTexture = new THREE.CanvasTexture(envCanvas);
            envTexture.mapping = THREE.EquirectangularReflectionMapping;
            const ctx = envCanvas.getContext("2d");
            let smoothed = 120;

            envInterval = setInterval(() => {
              if (envMode !== "cam") return;
              if (!video || video.readyState < 2) return;
              ctx.drawImage(video, 0, 0, 32, 32);
              envTexture.needsUpdate = true;
              if (pmremGenerator) {
                if (cameraRT) cameraRT.dispose();
                cameraRT = pmremGenerator.fromEquirectangular(envTexture);
                if (envMode === "cam") sceneEl.object3D.environment = cameraRT.texture;
              }
              const pixels = ctx.getImageData(0, 0, 32, 32).data;
              let total = 0;
              for (let i = 0; i < pixels.length; i += 4) total += (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
              const brightness = total / (pixels.length / 4);
              smoothed += (brightness - smoothed) * 0.08;
              const exposure = 0.6 + (smoothed / 255) * 0.9;
              if (sceneEl.renderer) sceneEl.renderer.exposure = exposure;
            }, 120);
          }
        }, 300);

        new THREE.RGBELoader().load("terrace_sea.hdr", (hdr) => {
          hdr.mapping = THREE.EquirectangularReflectionMapping;
          originalEnv = hdr;
          sceneEl.object3D.environment = hdr;
        });

        if (sceneEl.renderer) sceneEl.renderer.setClearColor(0x000000, 0);
        sceneEl.setAttribute("background", "color: transparent");

        if (sceneEl.hasLoaded) { sceneEl.emit("runreality"); }
        else { sceneEl.addEventListener("loaded", () => sceneEl.emit("runreality"), { once: true }); }
      }, { once: true });
    }

    function startAR(modelSrc) {
      return loadXR8Assets()
        .then(() => createARScene(modelSrc))
        .catch((err) => {
          xrBootState = { status: "error", source: xrBootState.source };
          window.Tracking.lastEvent = "xr-boot-error";
          window.Tracking.source = "boot";
          console.error("XR boot failed:", err);
          throw err;
        });
    }

    window.toggleEnv = function() {
      const scene = document.querySelector("a-scene");
      const btn = document.getElementById("envToggle");
      if (!scene) return;
      if (envMode === "hdr") {
        if (cameraRT) scene.object3D.environment = cameraRT.texture;
        envMode = "cam";
        if (btn) btn.innerText = "Env: CAM";
      } else if (envMode === "cam") {
        scene.object3D.environment = null;
        envMode = "off";
        if (btn) btn.innerText = "Env: OFF";
      } else {
        scene.object3D.environment = originalEnv;
        envMode = "hdr";
        if (btn) btn.innerText = "Env: HDR";
      }
    };

    const models = [
      "Plato_01.glb","Plato_02.glb","Plato_03.glb","Plato_04.glb",
      "Plato_05.glb","Plato_06.glb","Plato_07.glb","Plato_08.glb",
      "Plato_09.glb","Plato_10.glb","Plato_11.glb","Plato_12.glb",
      "Plato_13.glb","Plato_14.glb","Plato_15.glb"
    ];

    window.addEventListener("DOMContentLoaded", () => {
      const modelIdx = sessionStorage.getItem("modelo_actual");
      if (modelIdx !== null) {
        startAR(models[parseInt(modelIdx)]);
      }
    });
  </script>
</body>
</html>
